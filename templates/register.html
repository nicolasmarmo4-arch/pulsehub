<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Criar conta</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #36393f;
            color: white;
        }

        .box {
            max-width: 420px;
            margin: 60px auto;
            background: #2f3136;
            padding: 24px;
            border-radius: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #5865f2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        a {
            color: #8ea1e1;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Criar conta</h1>

        <form method="POST">
            <input name="username" placeholder="Nome de usuário" required>
            <input name="email" type="email" placeholder="Email" required>
            <input name="password" type="password" placeholder="Senha" required>
            <input name="profile_photo" placeholder="Link da foto de perfil">
            <button type="submit">Cadastrar</button>
        </form>

        <p>Já tem conta? <a href="/login">Entrar</a></p>
    </div>
</body>
</html>
